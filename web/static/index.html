<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TGM Dashboard</title>
  <link rel="stylesheet" href="/static/app.css?v=8" />
  <script src="/static/vendor/chart.umd.min.js"></script>
  <script src="/static/vendor/hammer.min.js"></script>
  <script src="/static/vendor/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="sidebar-toggle" aria-label="Menu">&#9776;</button>
      <span class="topbar-brand">TGM</span>
      <div id="guild-select" class="guild-picker" style="display:none">
        <button class="guild-picker__toggle" type="button">
          <span class="guild-picker__name"></span>
          <svg class="guild-picker__chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <ul class="guild-picker__menu"></ul>
      </div>
      <nav id="topbar-tabs"></nav>
      <span id="me"></span>
    </header>
    <div id="sidebar-backdrop"></div>
    <div id="body-row">
      <aside id="sidebar">
        <nav id="sidebar-items"></nav>
      </aside>
      <main id="panel-container">
        <div id="panel-root"></div>
      </main>
    </div>
  </div>
  <script type="module" src="/static/js/app.js?v=12"></script>
</body>
</html>
