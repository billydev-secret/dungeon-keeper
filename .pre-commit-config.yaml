default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: gate-quick
        name: gate (ruff + pyright)
        # gate.py locates the repo venv itself, so this works on Linux and
        # Windows with whatever `python` is on PATH.
        entry: python scripts/gate.py --quick
        language: system
        pass_filenames: false
        always_run: true
