<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-labelledby="title desc">
  <title id="title">Golden poppy picture frame</title>
  <desc id="desc">A wide rounded black picture frame with a glowing gold border and golden poppy flowers decorating the lower left corner.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0A8"/>
      <stop offset=".22" stop-color="#FFC449"/>
      <stop offset=".55" stop-color="#F2A51F"/>
      <stop offset="1" stop-color="#B87512"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE77B"/>
      <stop offset=".48" stop-color="#FDBA2D"/>
      <stop offset="1" stop-color="#D98209"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D29A26"/>
      <stop offset="1" stop-color="#705015"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <symbol id="poppy" viewBox="-60 -45 120 90">
      <g filter="url(#shadow)">
        <path d="M-4 8 C-34 25 -58 3 -49 -22 C-38 -51 -5 -28 0 -4 C8 -31 43 -47 54 -19 C65 10 34 29 5 9 Z" fill="url(#petal)" stroke="#7B3E06" stroke-width="2"/>
        <path d="M-5 8 C-35 13 -38 -21 -12 -26 C4 -29 4 -1 -5 8 Z" fill="#FFCD39" opacity=".85"/>
        <path d="M7 7 C37 14 39 -18 16 -24 C1 -28 -1 -1 7 7 Z" fill="#FFD75B" opacity=".85"/>
        <path d="M-38 -10 C-22 -2 -13 6 -7 17 M-20 -24 C-13 -7 -9 4 -6 17 M24 -24 C14 -7 10 4 7 17 M40 -7 C23 -1 15 7 9 17" fill="none" stroke="#9B5A08" stroke-width="2" opacity=".55" stroke-linecap="round"/>
        <ellipse cx="0" cy="12" rx="20" ry="10" fill="#4A2308"/>
        <ellipse cx="0" cy="10" rx="13" ry="6" fill="#A94F0E"/>
        <g fill="#170D05">
          <circle cx="-16" cy="6" r="3"/><circle cx="-9" cy="3" r="2.5"/><circle cx="0" cy="2" r="2.7"/><circle cx="8" cy="4" r="2.5"/><circle cx="16" cy="7" r="3"/>
        </g>
      </g>
    </symbol>
    <symbol id="bud" viewBox="-18 -28 36 56">
      <path d="M0 26 C-3 8 -2 -3 0 -18" fill="none" stroke="#8B6418" stroke-width="4" stroke-linecap="round"/>
      <path d="M0 -24 C18 -14 17 8 0 17 C-17 8 -18 -14 0 -24 Z" fill="url(#petal)" stroke="#7B3E06" stroke-width="1.5"/>
      <path d="M0 -22 C-4 -8 -4 5 0 16 M8 -16 C4 -6 4 5 0 15 M-8 -16 C-4 -6 -4 5 0 15" fill="none" stroke="#A75B06" stroke-width="1.4" opacity=".7"/>
    </symbol>
    <symbol id="leafSpray" viewBox="0 0 130 70">
      <path d="M4 64 C32 38 65 23 123 7" fill="none" stroke="#8B6418" stroke-width="4" stroke-linecap="round"/>
      <g fill="url(#leaf)" stroke="#38260B" stroke-width="1.2">
        <path d="M26 43 C11 35 11 20 32 28 C29 33 28 38 26 43Z"/>
        <path d="M42 34 C27 22 33 9 50 22 C47 26 45 30 42 34Z"/>
        <path d="M60 27 C47 12 56 2 70 18 C66 21 63 24 60 27Z"/>
        <path d="M79 21 C66 8 78 -2 91 13 C87 16 83 19 79 21Z"/>
        <path d="M95 16 C86 2 102 -4 111 10 C106 12 101 14 95 16Z"/>
        <path d="M34 47 C48 36 60 43 49 57 C44 52 39 49 34 47Z"/>
        <path d="M57 37 C72 29 82 39 68 50 C66 45 62 41 57 37Z"/>
        <path d="M81 28 C97 23 104 35 88 43 C87 38 85 33 81 28Z"/>
      </g>
    </symbol>
  </defs>

  <rect width="900" height="500" rx="0" fill="#080808"/>
  <rect x="38" y="38" width="824" height="424" rx="58" fill="none" stroke="#000" stroke-width="26"/>
  <rect x="50" y="50" width="800" height="400" rx="48" fill="none" stroke="url(#gold)" stroke-width="9" filter="url(#softGlow)"/>

  <g transform="translate(35 430)">
    <path d="M48 4 C74 -95 105 -177 155 -270 M102 7 C129 -84 166 -159 236 -226 M168 7 C195 -68 239 -119 326 -160 M228 8 C293 -45 363 -62 475 -76" fill="none" stroke="#6F4E13" stroke-width="6" stroke-linecap="round"/>
    <use href="#leafSpray" x="152" y="-75" transform="rotate(-6 152 -75) scale(1.5)"/>
    <use href="#leafSpray" x="-10" y="-50" transform="rotate(-42 -10 -50) scale(1.25)"/>
    <use href="#leafSpray" x="70" y="-115" transform="rotate(-72 70 -115) scale(1.25)"/>
    <use href="#leafSpray" x="260" y="-58" transform="rotate(6 260 -58) scale(1.35)"/>

    <use href="#poppy" x="108" y="-105" width="150" height="112"/>
    <use href="#poppy" x="58" y="-225" width="168" height="126"/>
    <use href="#poppy" x="245" y="-110" width="145" height="108"/>
    <use href="#poppy" x="16" y="-70" width="122" height="92" transform="rotate(-10 77 -24)"/>
    <use href="#poppy" x="346" y="-54" width="82" height="62"/>

    <use href="#bud" x="24" y="-214" width="42" height="64" transform="rotate(-22 45 -182)"/>
    <use href="#bud" x="82" y="-312" width="46" height="70"/>
    <use href="#bud" x="148" y="-252" width="36" height="56" transform="rotate(16 166 -224)"/>
    <use href="#bud" x="312" y="-181" width="38" height="58" transform="rotate(20 331 -152)"/>
    <use href="#bud" x="456" y="-95" width="34" height="52" transform="rotate(72 473 -69)"/>
    <use href="#bud" x="386" y="-78" width="28" height="44" transform="rotate(28 400 -56)"/>
  </g>
</svg>
